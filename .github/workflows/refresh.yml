# Fraîcheur automatique : crawl des sources 2×/jour, commit des données,
# build Astro et déploiement GitHub Pages. Aucune intervention manuelle.
name: Refresh data & deploy

on:
  schedule:
    - cron: "0 4 * * *"   # 6h heure de Paris (été)
    - cron: "0 15 * * *"  # 17h — rattrape les annonces publiées dans la journée
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      # La clé de déploiement (secret DATA_DEPLOY_KEY + deploy key en écriture
      # dans Settings → Deploy keys) permet au commit des données de passer le
      # ruleset de protection de main : « Deploy keys » figure dans sa bypass
      # list — l'app GitHub Actions n'y est pas proposée sur un compte perso.
      - uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.DATA_DEPLOY_KEY }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pipeline
        run: pip install -r pipeline/requirements.txt

      - name: Run tests
        run: pip install pytest && python -m pytest pipeline/tests -q

      - name: Crawl sources
        working-directory: pipeline
        env:
          # À renseigner dans Settings → Secrets pour activer les sources réelles :
          OPENAGENDA_KEY: ${{ secrets.OPENAGENDA_KEY }}
          # Extraction LLM des pages HTML (optionnel, ex: "gemini:gemini-3.5-flash").
          # QUEFAIRE_LLM2 est un backup (ex: "deepseek:deepseek-v4-flash") : testé
          # automatiquement si le principal ne répond pas (quota épuisé, erreur).
          # Accepté en variable OU en secret de dépôt.
          QUEFAIRE_LLM: ${{ vars.QUEFAIRE_LLM || secrets.QUEFAIRE_LLM }}
          QUEFAIRE_LLM2: ${{ vars.QUEFAIRE_LLM2 || secrets.QUEFAIRE_LLM2 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          # Sources facebook/instagram (optionnel) : instance RSS-Bridge
          RSSBRIDGE_URL: ${{ vars.RSSBRIDGE_URL }}
        run: |
          if [ -n "$QUEFAIRE_LLM" ] || [ -n "$QUEFAIRE_LLM2" ]; then pip install autoagent-core; fi
          python -m quefaire crawl --sector isere

      # [skip ci] : contrairement au GITHUB_TOKEN, un push par deploy key
      # redéclenche les workflows — sans ce marqueur, chaque commit de données
      # relancerait un crawl, en boucle.
      - name: Commit refreshed data
        run: |
          git config user.name "quefaire-bot"
          git config user.email "actions@users.noreply.github.com"
          git add site/src/data
          git diff --cached --quiet || git commit -m "data: rafraîchissement automatique ($(date -u +%F)) [skip ci]"
          git push

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Build site
        working-directory: site
        env:
          SITE_URL: https://${{ github.repository_owner }}.github.io
          SITE_BASE: /${{ github.event.repository.name }}/
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: refresh
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
