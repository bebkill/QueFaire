# Registre des sources — secteur Isère (38)
#
# C'est LE fichier à enrichir pour couvrir le territoire. Types supportés :
#   rss        : flux RSS/Atom (le plus courant sur les sites communaux)
#   ical       : agenda iCal/.ics publié (mairies, associations)
#   openagenda : slug ou UID d'un agenda openagenda.com (OPENAGENDA_KEY requise)
#   html       : page agenda sans flux — extraction par agent LLM (QUEFAIRE_LLM requis)
#
# `python -m quefaire discover --sector isere` propose de nouvelles entrées
# (agent autoagent-core) ; on les vérifie puis on passe enabled: true.
#
# Les sources ci-dessous sont des candidates connues mais non vérifiées depuis
# cet environnement (réseau restreint) : les activer une à une après test
# `python -m quefaire crawl --sector isere`.

sector:
  name: Isère
  country: FR
  center_lat: 45.2
  center_lon: 5.68

sources:
  # --- OpenAgenda (couverture large, 1 clé gratuite pour tout) ---------------
  - id: oa-grenoble
    name: Ville de Grenoble (OpenAgenda)
    type: openagenda
    url: grenoble
    commune: Grenoble
    enabled: false

  - id: oa-echirolles
    name: Ville d'Échirolles (OpenAgenda)
    type: openagenda
    url: ville-dechirolles
    commune: Échirolles
    enabled: false

  - id: oa-smh
    name: Saint-Martin-d'Hères (OpenAgenda)
    type: openagenda
    url: saint-martin-d-heres
    commune: Saint-Martin-d'Hères
    enabled: false

  # --- Flux RSS communaux / intercommunaux -----------------------------------
  - id: rss-vienne
    name: Ville de Vienne — agenda
    type: rss
    url: https://www.vienne.fr/rss
    commune: Vienne
    enabled: false

  - id: rss-bourgoin
    name: Bourgoin-Jallieu — actualités et agenda
    type: rss
    url: https://www.bourgoinjallieu.fr/rss
    commune: Bourgoin-Jallieu
    enabled: false

  # --- Nord-Isère -------------------------------------------------------------
  # Sources identifiées (recherche web juillet 2026). Pas de flux RSS/iCal
  # repérés : ce sont des pages agenda → extraction LLM (type html).
  # `discover-oa` trouvera en plus les agendas OpenAgenda du territoire.

  - id: html-capi
    name: CAPI (Porte de l'Isère) — tout l'agenda
    type: html
    url: https://capi-agglo.fr/tout-lagenda/
    commune: L'Isle-d'Abeau
    enabled: true

  - id: html-bourgoin
    name: Ville de Bourgoin-Jallieu — agenda
    type: html
    url: https://www.bourgoinjallieu.fr/agenda
    commune: Bourgoin-Jallieu
    enabled: true

  - id: html-weekend-capi
    name: Mon week-end à la CAPI
    type: html
    url: https://www.monweekendalacapi.fr/
    commune: Villefontaine
    enabled: false

  - id: html-balcons-dauphine
    name: OT Balcons du Dauphiné — tout l'agenda (Crémieu, Morestel, Saint-Chef…)
    type: html
    url: https://www.balconsdudauphine-tourisme.com/agenda/tout-lagenda/
    commune: Crémieu
    enabled: false

  - id: html-vals-dauphine
    name: OT Les Vals du Dauphiné — agenda (La Tour-du-Pin, Pont-de-Beauvoisin…)
    type: html
    url: https://www.tourisme-valsdudauphine.fr/agenda/
    commune: La Tour-du-Pin
    enabled: false

  # --- Réseaux sociaux ---------------------------------------------------------
  # Types facebook / instagram : `url` = identifiant de la page.
  # Nécessitent une instance RSS-Bridge (RSSBRIDGE_URL) + QUEFAIRE_LLM :
  # les posts récents sont convertis en événements par l'agent LLM.
  # Exemples à vérifier/compléter — beaucoup de petites communes n'annoncent
  # leurs événements QUE sur Facebook.

  - id: fb-bourgoin
    name: Ville de Bourgoin-Jallieu (Facebook)
    type: facebook
    url: villedebourgoinjallieu
    commune: Bourgoin-Jallieu
    enabled: false

  - id: fb-cremieu
    name: Ville de Crémieu (Facebook)
    type: facebook
    url: mairiedecremieu
    commune: Crémieu
    enabled: false

  - id: ig-capi
    name: CAPI — Porte de l'Isère (Instagram)
    type: instagram
    url: capi_agglo
    commune: L'Isle-d'Abeau
    enabled: false

  # --- Offices de tourisme (pages agenda, extraction LLM) --------------------
  - id: html-vercors
    name: OT Villard-de-Lans / Vercors — agenda
    type: html
    url: https://www.villarddelans.com/agenda/
    commune: Villard-de-Lans
    enabled: false

  - id: html-chamrousse
    name: OT Chamrousse — agenda
    type: html
    url: https://www.chamrousse.com/agenda.html
    commune: Chamrousse
    enabled: false

  - id: html-oisans
    name: Oisans Tourisme — agenda
    type: html
    url: https://www.oisans.com/agenda/
    commune: Le Bourg-d'Oisans
    enabled: false
